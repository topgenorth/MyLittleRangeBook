name: Build MyLittleRangeBook

on:
  push:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-latest
            rid: win-x64
          - platform: linux
            os: ubuntu-latest
            rid: linux-x64
#          - platform: macos
#            os: macos-latest
#            rid: osx-x64

    runs-on: ${{ matrix.os }}

    env:
      VERSION_MAJOR: 1
      VERSION_MINOR: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute version metadata
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${GITHUB_RUN_NUMBER}"
          ASSEMBLY_VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.0.0"
          FILE_VERSION="${VERSION_MAJOR}.${VERSION_MINOR}.${GITHUB_RUN_NUMBER}.0"
          INFORMATIONAL_VERSION="${VERSION}+${SHORT_SHA}"

          {
            echo "SHORT_SHA=$SHORT_SHA"
            echo "VERSION=$VERSION"
            echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION"
            echo "FILE_VERSION=$FILE_VERSION"
            echo "INFORMATIONAL_VERSION=$INFORMATIONAL_VERSION"
          } >> "$GITHUB_ENV"

      - name: Write CI Directory.Build.props
        shell: bash
        run: |
          cat > Directory.Build.props <<EOF
          <Project>
            <PropertyGroup>
              <Version>${VERSION}</Version>
              <AssemblyVersion>${ASSEMBLY_VERSION}</AssemblyVersion>
              <FileVersion>${FILE_VERSION}</FileVersion>
              <InformationalVersion>${INFORMATIONAL_VERSION}</InformationalVersion>
            </PropertyGroup>
          </Project>
          EOF

      - name: Restore CLI
        shell: bash
        run: |
          dotnet restore src/mlrb/MyLittleRangeBook.CLI/MyLittleRangeBook.CLI.csproj \
            -r "${{ matrix.rid }}"

      - name: Publish CLI
        shell: bash
        run: |
          dotnet publish src/mlrb/MyLittleRangeBook.CLI/MyLittleRangeBook.CLI.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "./out/${{ matrix.platform }}/MyLittleRangeBook-CLI"

      - name: Restore GUI
        shell: bash
        run: |
          dotnet restore src/mlrb/MyLittleRangeBook.GUI/MyLittleRangeBook.GUI.csproj \
            -r "${{ matrix.rid }}"

#      - name: Run tests
#        shell: bash
#        run: |
#          # [To20260419] Disable GUI tests for now.
#          #  dotnet test src/mlrb/MyLittleRangeBook.GUI.Tests/MyLittleRangeBook.GUI.Tests.csproj -c Release
#          dotnet test src/mlrb/MyLittleRangeBook.Tests/MyLittleRangeBook.Tests.csproj -c Release

      - name: Publish GUI
        shell: bash
        run: |
          dotnet publish src/mlrb/MyLittleRangeBook.GUI/MyLittleRangeBook.GUI.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "./out/${{ matrix.platform }}/MyLittleRangeBook-GUI"

      - name: Show resolved versions
        shell: bash
        run: |
          echo "Version=$VERSION"
          echo "AssemblyVersion=$ASSEMBLY_VERSION"
          echo "FileVersion=$FILE_VERSION"
          echo "InformationalVersion=$INFORMATIONAL_VERSION"

      - name: Upload ${{ matrix.platform }} artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: mlrb-${{env.INFORMATIONAL_VERSION}}-${{ matrix.platform }}-executables
          path: |
            out/${{ matrix.platform }}/MyLittleRangeBook-CLI/
            out/${{ matrix.platform }}/MyLittleRangeBook-GUI/
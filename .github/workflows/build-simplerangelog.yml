name: Build MyLittleRangeBook

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            os: windows-2022
            rid: win-x64
          - platform: linux
            os: ubuntu-22.04
            rid: linux-x64
#          - platform: macos
#            os: macos-latest
#            rid: osx-x64

    runs-on: ${{ matrix.os }}

    env:
      VERSION_MAJOR: 0
      VERSION_MINOR: 14
      VERSION_REVISION: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Compute version metadata
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Use hardcoded VERSION_MINOR by default
          DETECTED_MINOR="${VERSION_MINOR}"

          # If merging to master, attempt to use the PR number as the minor version
          if [[ "${GITHUB_REF}" == "refs/heads/master" ]]; then
            PR_NUMBER=$(gh pr list --commit "${GITHUB_SHA}" --state merged --json number --jq '.[0].number' 2>/dev/null || echo "")
            if [[ -n "${PR_NUMBER}" ]]; then
              echo "Detected PR merge to master. Using PR #${PR_NUMBER} as VERSION_MINOR."
              DETECTED_MINOR="${PR_NUMBER}"
            fi
          fi

          VERSION="${VERSION_MAJOR}.${DETECTED_MINOR}.${VERSION_REVISION}"
          ASSEMBLY_VERSION="${VERSION}.${GITHUB_RUN_NUMBER}"
          FILE_VERSION="${VERSION}.${GITHUB_RUN_NUMBER}"
          SHORT_SHA="${GITHUB_SHA:0:7}"
          INFORMATIONAL_VERSION="${ASSEMBLY_VERSION}+${SHORT_SHA}"
          {
            echo "SHORT_SHA=$SHORT_SHA"
            echo "VERSION_MINOR=$DETECTED_MINOR"
            echo "VERSION=$VERSION"
            echo "ASSEMBLY_VERSION=$ASSEMBLY_VERSION"
            echo "FILE_VERSION=$FILE_VERSION"
            echo "INFORMATIONAL_VERSION=$INFORMATIONAL_VERSION"
          } >> "$GITHUB_ENV"

      - name: Write CI Directory.Build.props
        shell: bash
        run: |
          cat > Directory.Build.props <<EOF
          <Project>
            <PropertyGroup>
              <Version>${VERSION}</Version>
              <AssemblyVersion>${ASSEMBLY_VERSION}</AssemblyVersion>
              <FileVersion>${FILE_VERSION}</FileVersion>
              <InformationalVersion>${INFORMATIONAL_VERSION}</InformationalVersion>
            </PropertyGroup>
          </Project>
          EOF

      - name: Restore CLI
        shell: bash
        run: |
          dotnet restore src/mlrb/MyLittleRangeBook.CLI/MyLittleRangeBook.CLI.csproj \
            -r "${{ matrix.rid }}"

      - name: Run tests
        shell: bash
        run: |
          dotnet test src/mlrb/MyLittleRangeBook.Tests/MyLittleRangeBook.Tests.csproj -c Release

      - name: Publish CLI
        shell: bash
        run: |
          dotnet publish src/mlrb/MyLittleRangeBook.CLI/MyLittleRangeBook.CLI.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "./out/${{ matrix.platform }}/MyLittleRangeBook-CLI"

      - name: Restore GUI
        shell: bash
        run: |
          dotnet restore src/mlrb/MyLittleRangeBook.GUI/MyLittleRangeBook.GUI.csproj \
            -r "${{ matrix.rid }}"

      - name: Publish GUI
        shell: bash
        run: |
          dotnet publish src/mlrb/MyLittleRangeBook.GUI/MyLittleRangeBook.GUI.csproj \
            -c Release \
            -r "${{ matrix.rid }}" \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -o "./out/${{ matrix.platform }}/MyLittleRangeBook-GUI"

      - name: Show resolved versions
        shell: bash
        run: |
          echo "Version=$VERSION"
          echo "AssemblyVersion=$ASSEMBLY_VERSION"
          echo "FileVersion=$FILE_VERSION"
          echo "InformationalVersion=$INFORMATIONAL_VERSION"

      - name: Upload ${{ matrix.platform }} artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: mlrb-${{env.INFORMATIONAL_VERSION}}-${{ matrix.platform }}-executables
          path: |
            out/${{ matrix.platform }}/MyLittleRangeBook-CLI/
            out/${{ matrix.platform }}/MyLittleRangeBook-GUI/
